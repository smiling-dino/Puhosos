env_settings:
  num_areas: 25

environment_parameters:
  initial_target_visible_probability:
    curriculum:
      - name: grasp_and_lift
        completion_criteria:
          # Переходим дальше только после обучения успешному Z-подъёму,
          # а не после прохождения фиксированной доли max_steps.
          measure: reward
          behavior: GFSX_Brain
          signal_smoothing: true
          min_lesson_length: 100
          # Без терминального успеха суммарный положительный бюджет < 0.95,
          # поэтому 1.0 нельзя пройти одним лишь shaping-прогрессом.
          threshold: 1.00
          require_reset: true
        value: 1.0
      - name: guided_search
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.80
          require_reset: true
        value: 0.7
      - name: mixed_search
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.70
          require_reset: true
        value: 0.4
      - name: final_search
        value: 0.2

behaviors:
  GFSX_Brain:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      memory:
        sequence_length: 64
        memory_size: 256
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 5000000
    time_horizon: 1000
    summary_freq: 25000
