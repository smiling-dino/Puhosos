env_settings:
  num_envs: 4
  num_areas: 8
  timeout_wait: 120


environment_parameters:
  training_stage:
    curriculum:
      - name: capture_only_clean
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.55
          require_reset: true
        value: 0.0
      - name: capture_and_lift_clean
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 0.55
          require_reset: true
        value: 1.0
      - name: full_route_clean
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          signal_smoothing: true
          min_lesson_length: 150
          threshold: 0.60
          require_reset: true
        value: 2.0
      - name: full_route_p1
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          signal_smoothing: true
          min_lesson_length: 200
          threshold: 0.50
          require_reset: true
        value: 3.0
      - name: full_route_p1_p2
        value: 4.0

behaviors:
  GFSX_Brain:
    trainer_type: ppo

    hyperparameters:
      batch_size: 2048
      buffer_size: 32768
      learning_rate: 0.0003
      learning_rate_schedule: linear
      beta: 0.01
      beta_schedule: linear
      epsilon: 0.2
      epsilon_schedule: linear
      lambd: 0.95
      num_epoch: 3

    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 2

    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0

    max_steps: 3000000
    time_horizon: 512
    summary_freq: 10000
    checkpoint_interval: 250000
    keep_checkpoints: 10
